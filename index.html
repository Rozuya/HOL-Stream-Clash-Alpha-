<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HOL Arena | IA Avancée</title>
    <style>
        :root { --bg: #09090b; --panel: #18181b; --accent: #3b82f6; --player: #22c55e; --enemy: #ef4444; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .row { display: flex; gap: 20px; margin: 20px; }
        .card { width: 150px; background: var(--panel); padding: 15px; border-radius: 12px; border: 2px solid #333; transition: 0.3s; cursor: pointer; }
        .card.active { border-color: var(--accent); }
        .hp-bar { height: 8px; background: #27272a; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; transition: 0.5s; }
        #log { width: 400px; height: 100px; background: #000; padding: 10px; border-radius: 8px; font-size: 14px; overflow-y: auto; color: #a1a1aa; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <h1>CHOIX DU NIVEAU</h1>
    <select id="diff" style="padding: 10px; margin-bottom: 20px;">
        <option value="Facile">🤖 Facile (IA Passive)</option>
        <option value="Normale">⚔️ Normale (IA Tactique)</option>
        <option value="Difficile">🔥 Difficile (IA Compétitive)</option>
    </select>
    <br><button onclick="initGame()">DÉMARRER LE LIVE</button>
</div>

<div id="game" style="display:none; text-align:center;">
    <div class="row" id="enemy-row"></div>
    <div id="log">En attente...</div>
    <div class="row" id="player-row"></div>
    <div id="actions"></div>
</div>

<script>
    let state = { p: [], e: [], turn: 'player', diff: '' };

    function initGame() {
        state.diff = document.getElementById('diff').value;
        state.p = [{n:"Guerrier", hp:100, max:100}, {n:"Mage", hp:100, max:100}];
        state.e = [{n:"IA " + state.diff, hp:200, max:200}];
        document.getElementById('ui').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        update();
    }

    function update() {
        document.getElementById('player-row').innerHTML = state.p.map((p, i) => `
            <div class="card" onclick="select(${i})">
                <h3>${p.n}</h3>
                <div class="hp-bar"><div class="fill" style="width:${(p.hp/p.max)*100}%; background:var(--player)"></div></div>
            </div>`).join('');
        document.getElementById('enemy-row').innerHTML = state.e.map(e => `
            <div class="card"><h3>${e.n}</h3><div class="hp-bar"><div class="fill" style="width:${(e.hp/e.max)*100}%; background:var(--enemy)"></div></div></div>`).join('');
    }

    function select(i) {
        if(state.turn !== 'player') return;
        document.getElementById('actions').innerHTML = `<button onclick="attack(${i})">ATTAQUER (-20 HP)</button>`;
    }

    function attack(i) {
        state.e[0].hp -= 20;
        document.getElementById('log').innerHTML = `Tu infliges 20 dégâts !`;
        state.turn = 'ai';
        update();
        setTimeout(aiTurn, 1000);
    }

    function aiTurn() {
        // --- CERVEAU DE L'IA ---
        let action = "";
        if (state.diff === "Facile") {
            // IA facile : attaque juste sans réfléchir
            state.p[0].hp -= 10;
            action = "L'IA attaque faiblement (-10)";
        } 
        else if (state.diff === "Normale") {
            // IA normale : se soigne si vie basse
            if (state.e[0].hp < 80) { state.e[0].hp += 20; action = "L'IA se soigne (+20)"; }
            else { state.p[0].hp -= 15; action = "L'IA attaque (-15)"; }
        } 
        else if (state.diff === "Difficile") {
            // IA difficile : cherche à finir le combat
            if (state.e[0].hp < 150) { state.e[0].hp += 30; action = "L'IA utilise un soin majeur (+30)"; }
            else { state.p[0].hp -= 25; action = "L'IA assène un coup puissant (-25)"; }
        }

        document.getElementById('log').innerHTML = action;
        state.turn = 'player';
        update();
    }
</script>
</body>
</html>
