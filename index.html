<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HOL Arena | Ultime</title>
    <style>
        :root { --bg: #09090b; --panel: #18181b; --accent: #3b82f6; --player: #22c55e; --enemy: #ef4444; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        /* Menu & Overlay */
        #ui-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .menu-card { background: var(--panel); padding: 30px; border-radius: 15px; text-align: center; width: 400px; border: 1px solid #333; }
        
        /* Arena */
        .game-ui { display: flex; flex-direction: column; gap: 30px; align-items: center; }
        .row { display: flex; gap: 20px; }
        .card { width: 140px; background: var(--panel); padding: 15px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .card.active { border-color: var(--accent); transform: scale(1.05); }
        .hp-bar { height: 8px; background: #27272a; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; transition: 0.5s; }

        #log { width: 500px; height: 100px; background: #000; padding: 10px; border-radius: 8px; font-size: 14px; color: #a1a1aa; overflow-y: auto; border: 1px solid #333; }
        button { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="menu-card">
        <h1>HOL ARENA</h1>
        <p>Règles : Éliminez l'IA. 1 tour chacun. Choisissez votre héros pour attaquer.</p>
        <select id="diff" style="padding: 10px; width: 100%; margin-bottom: 20px;">
            <option value="Facile">IA Facile (Dégâts faibles)</option>
            <option value="Normale">IA Normale (Dégâts moyens)</option>
            <option value="Difficile">IA Difficile (Dégâts élevés + soins)</option>
        </select>
        <button onclick="initGame()">COMMENCER LE LIVE</button>
    </div>
</div>

<div class="game-ui">
    <div class="row" id="enemy-row"></div>
    <div id="log">Bienvenue dans l'arène !</div>
    <div class="row" id="player-row"></div>
    <div id="actions"></div>
</div>

<script>
    let state = { p: [], e: [], turn: 'player', diff: '' };

    function initGame() {
        state.diff = document.getElementById('diff').value;
        state.p = [{n:"Guerrier", hp:100, max:100}, {n:"Mage", hp:80, max:80}];
        state.e = [{n:"IA ("+state.diff+")", hp:150, max:150}];
        document.getElementById('ui-overlay').style.display = 'none';
        update();
    }

    function update() {
        document.getElementById('player-row').innerHTML = state.p.map((p, i) => `
            <div class="card" onclick="select(${i})">
                <h3>${p.n}</h3>
                <div class="hp-bar"><div class="fill" style="width:${(p.hp/p.max)*100}%; background:var(--player)"></div></div>
            </div>`).join('');
        document.getElementById('enemy-row').innerHTML = state.e.map(e => `
            <div class="card"><h3>${e.n}</h3><div class="hp-bar"><div class="fill" style="width:${(e.hp/e.max)*100}%; background:var(--enemy)"></div></div></div>`).join('');
    }

    function select(i) {
        if(state.turn !== 'player') return;
        document.getElementById('actions').innerHTML = `
            <button onclick="attack(${i})">ATTAQUER (-20 HP)</button>
        `;
    }

    function attack(i) {
        state.e[0].hp -= 20;
        document.getElementById('log').innerHTML = `Le ${state.p[i].n} attaque ! IA : -20 HP`;
        state.turn = 'ai';
        update();
        setTimeout(aiTurn, 1000);
    }

    function aiTurn() {
        let dmg = (state.diff === 'Facile' ? 5 : state.diff === 'Normale' ? 15 : 30);
        state.p[0].hp -= dmg;
        document.getElementById('log').innerHTML = `L'IA réplique ! ${state.p[0].n} : -${dmg} HP`;
        state.turn = 'player';
        document.getElementById('actions').innerHTML = "";
        update();
    }
</script>
</body>
</html>
