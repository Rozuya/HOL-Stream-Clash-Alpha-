<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOL Arena - Alpha 1.0</title>
    <style>
        /* ==========================================================================
           VARIABLES & RESET
           ========================================================================== */
        :root {
            --bg-color: #0d0e15;
            --panel-bg: rgba(20, 22, 35, 0.85);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent-purple: #b92b27;
            --accent-gold: #f4d03f;
            --hp-color: #ff4757;
            --shield-color: #1e90ff;
            --energy-color: #ffa502;
            --text-main: #f1f2f6;
            --border-radius: 12px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: var(--font-main);
            color: var(--text-main);
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* ==========================================================================
           BACKGROUND & PARTICLES
           ========================================================================== */
        #background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1c29 0%, #0d0e15 100%);
            z-index: -2;
        }

        .particle {
            position: absolute;
            background: rgba(0, 210, 255, 0.5);
            border-radius: 50%;
            animation: float-up linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ==========================================================================
           GLOBAL UI ELEMENTS
           ========================================================================== */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .screen.active {
            display: flex;
            opacity: 1;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            margin-bottom: 10px;
            text-align: center;
        }

        h2 { font-size: 1.5rem; color: #a4b0be; margin-bottom: 40px; }

        .btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            width: 250px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            border-color: var(--primary);
        }

        .btn:active { transform: translateY(1px); }

        /* ==========================================================================
           MODALS (Rules, Options, Credits)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--primary);
            border-radius: var(--border-radius);
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        .modal-content h3 { color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal-content p, .modal-content ul { margin-bottom: 15px; line-height: 1.6; color: #ced6e0; }
        .modal-content li { margin-left: 20px; }

        /* ==========================================================================
           COMBAT INTERFACE
           ========================================================================== */
        #combat-screen {
            justify-content: space-between;
            padding: 20px;
        }

        .arena {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 100%;
            height: 60vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        .team {
            display: flex;
            justify-content: center;
            gap: 20px;
            perspective: 1000px;
        }

        .team.enemy-team { margin-bottom: 20px; }

        /* Card Styles */
        .card {
            width: 140px;
            height: 220px;
            background: linear-gradient(180deg, #2c3e50, #1a252f);
            border-radius: var(--border-radius);
            padding: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            border: 2px solid #576574;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .card { width: 100px; height: 160px; padding: 5px; }
            .card-name { font-size: 0.7rem; }
            .card-portrait { height: 60px; }
        }

        .card.active-turn {
            transform: translateY(-15px);
            box-shadow: 0 0 25px var(--accent-gold);
            border-color: var(--accent-gold);
            animation: pulse-border 1.5s infinite;
        }

        .card.targetable:hover {
            transform: scale(1.05);
            border-color: var(--hp-color);
            box-shadow: 0 0 20px var(--hp-color);
        }

        .card.dead {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5) translateY(50px);
            transition: all 0.8s ease;
        }

        /* Rarities */
        .card[data-rarity="Commune"] { border-color: #95a5a6; }
        .card[data-rarity="Rare"] { border-color: #3498db; }
        .card[data-rarity="Épique"] { border-color: #9b59b6; }
        .card[data-rarity="Légendaire"] { border-color: #f1c40f; }

        .card-name {
            font-size: 0.85rem;
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-portrait {
            width: 100%;
            height: 90px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: rgba(255,255,255,0.2);
            overflow: hidden;
            position: relative;
        }

        .card-stats { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; gap: 4px; }

        .stat-bar {
            width: 100%;
            height: 10px;
            background: #2f3640;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }

        .stat-bar .fill {
            height: 100%;
            transition: width 0.3s ease;
        }

        .stat-bar.hp .fill { background: var(--hp-color); }
        .stat-bar.shield .fill { background: var(--shield-color); }
        .stat-bar.energy .fill { background: var(--energy-color); }

        .stat-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.55rem;
            line-height: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
        }

        /* Combat HUD */
        .combat-hud {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto;
            gap: 20px;
        }

        .combat-log {
            flex-grow: 1;
            height: 120px;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--border-radius);
            padding: 10px;
            overflow-y: auto;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .log-entry { animation: fade-in 0.3s ease; }
        .log-entry.damage { color: #ff6b81; }
        .log-entry.heal { color: #7bed9f; }
        .log-entry.skill { color: #eccc68; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
        }

        .controls .btn { width: 100%; padding: 10px; font-size: 1rem; margin: 0; }
        .controls .btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: gray; box-shadow: none; }

        .turn-indicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            padding: 10px 20px;
            background: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid var(--primary);
        }

        /* ==========================================================================
           ANIMATIONS & VFX
           ========================================================================== */
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-border { 0% { box-shadow: 0 0 10px var(--accent-gold); } 50% { box-shadow: 0 0 25px var(--accent-gold); } 100% { box-shadow: 0 0 10px var(--accent-gold); } }
        
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .flash-red { animation: flashR 0.3s ease; }
        @keyframes flashR { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(2) drop-shadow(0 0 20px red); } }

        .flash-blue { animation: flashB 0.3s ease; }
        @keyframes flashB { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(2) drop-shadow(0 0 20px blue); } }

        .flash-green { animation: flashG 0.5s ease; }
        @keyframes flashG { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(2) drop-shadow(0 0 20px lime); } }

        .floating-text {
            position: absolute;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 50;
            animation: float-text 1s ease-out forwards;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }

        @keyframes float-text {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
            width: 150px;
            text-align: center;
        }
        
        .footer-info {
            position: absolute;
            bottom: 10px;
            color: #7f8fa6;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="background"></div>

    <div id="screen-home" class="screen active">
        <h1>HOL Arena</h1>
        <h2>Alpha 1.0</h2>
        <button class="btn" onclick="UI.showScreen('screen-difficulty')">🎮 Jouer</button>
        <button class="btn" onclick="UI.openModal('modal-rules')">📖 Règles</button>
        <button class="btn" onclick="UI.openModal('modal-options')">⚙️ Options</button>
        <button class="btn" onclick="UI.openModal('modal-credits')">📜 Crédits</button>
        <div class="footer-info">Fan Game non officiel</div>
    </div>

    <div id="screen-difficulty" class="screen">
        <h1>Choix de la difficulté</h1>
        <button class="btn" onclick="Game.init('easy')">😊 Facile</button>
        <button class="btn" onclick="Game.init('normal')">😐 Normale</button>
        <button class="btn" onclick="Game.init('hard')">😈 Difficile</button>
        <button class="btn" style="margin-top: 30px; border-color: gray;" onclick="UI.showScreen('screen-home')">Retour</button>
    </div>

    <div id="screen-combat" class="screen">
        <div class="turn-indicator" id="turn-indicator">Début du combat...</div>
        
        <div class="arena">
            <div class="team enemy-team" id="enemy-team"></div>
            <div class="team player-team" id="player-team"></div>
        </div>

        <div class="combat-hud">
            <div class="combat-log" id="combat-log"></div>
            <div class="controls">
                <button class="btn" id="btn-attack" onclick="Game.selectAction('attack')">⚔️ Attaquer</button>
                <button class="btn" id="btn-skill" onclick="Game.selectAction('skill')">✨ Compétence</button>
                <button class="btn" id="btn-skip" onclick="Game.skipTurn()">⏳ Passer</button>
            </div>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <h1 id="end-title" style="font-size: 5rem;">Victoire</h1>
        <button class="btn" onclick="UI.showScreen('screen-difficulty')">🔄 Rejouer</button>
        <button class="btn" onclick="UI.showScreen('screen-home')">🏠 Accueil</button>
    </div>
